<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEYSEM | Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-950 text-white min-h-screen">

    <div id="login-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 text-center shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">PORTAL GEYSEM</h2>
            <input type="tel" id="user-phone" placeholder="Número de teléfono" class="w-full p-3 mb-4 bg-black border border-gray-700 rounded-lg text-center">
            <button onclick="login()" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-lg">ACCEDER</button>
        </div>
    </div>

    <div id="app-content" class="hidden p-6">
        <h1 class="text-3xl font-black text-yellow-500">BIENVENIDO A GEYSEM</h1>
        <p class="text-gray-400">Sistema cargado correctamente.</p>
    </div>

    <script>
        function login() {
            const phone = document.getElementById('user-phone').value;
            if(phone === "5535759383") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
            } else {
                alert("Número no autorizado");
            }
        }
    </script>
</body>
</html>
