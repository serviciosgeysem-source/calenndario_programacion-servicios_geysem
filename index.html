<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GEYSEM | Sistema de Servicios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { geysem: { yellow: '#FFD700', dark: '#0a0a0a', card: '#111111' } } } }
        }
    </script>
    <style>
        .scrollbar-custom::-webkit-scrollbar { width: 6px; }
        .scrollbar-custom::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .scrollbar-custom::-webkit-scrollbar-thumb:hover { background: #FFD700; }
    </style>
</head>
<body class="bg-geysem-dark font-sans text-gray-200 min-h-screen">

    <!-- LOGIN -->
    <div id="pantalla-login" class="fixed inset-0 z-[100] bg-geysem-dark flex items-center justify-center p-4">
        <div class="bg-geysem-card border border-gray-800 p-10 rounded-3xl shadow-2xl max-w-sm w-full text-center">
            <img src="logo_color.png" alt="GEYSEM" class="w-48 mx-auto mb-8">
            <h2 class="text-xl font-black text-white mb-6 uppercase tracking-widest">Portal Operativo</h2>
            <form onsubmit="iniciarSesion(event)" class="space-y-4">
                <input type="tel" id="input-telefono-login" required placeholder="Teléfono (10 dígitos)" pattern="[0-9]{10}" class="w-full px-4 py-3 bg-black border border-gray-800 text-white rounded-xl focus:ring-2 focus:ring-geysem-yellow outline-none text-center">
                <button type="submit" class="w-full bg-geysem-yellow text-black font-black py-3 rounded-xl hover:opacity-90 transition-all uppercase">Acceder</button>
            </form>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app-principal" class="hidden max-w-7xl mx-auto p-4 md:p-8 space-y-6">
        
        <!-- BANNER DIRECTOR -->
        <div id="banner-director" class="hidden bg-gradient-to-r from-blue-900/30 to-gray-900 border border-blue-800/50 p-6 rounded-2xl flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 text-2xl"><i class="fas fa-user-tie"></i></div>
            <div>
                <h2 class="text-lg font-bold text-white">Hola buen dia Director Rodolfo Mancilla</h2>
                <p class="text-blue-400 text-xs font-bold uppercase tracking-widest">Panel de Control General</p>
            </div>
        </div>

        <!-- HEADER -->
        <header class="bg-geysem-card rounded-3xl p-6 border border-gray-800 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <img src="logo_white.png" alt="Logo" class="w-32">
                <div class="hidden md:block h-10 w-px bg-gray-800"></div>
                <div>
                    <h1 class="text-xl font-bold text-white">Gestión de Servicios</h1>
                    <p id="info-usuario-activo" class="text-[10px] text-gray-500 uppercase font-black tracking-widest"></p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="btn-sin-asignar" onclick="abrirModalSinAsignar()" class="hidden bg-yellow-500/10 text-geysem-yellow border border-yellow-500/20 px-4 py-2 rounded-xl text-sm font-bold"><i class="fas fa-bolt mr-2"></i>Pendientes</button>
                <button id="btn-estadisticas" onclick="abrirModalEstadisticas()" class="hidden bg-purple-500/10 text-purple-400 border border-purple-500/20 px-4 py-2 rounded-xl text-sm font-bold"><i class="fas fa-chart-line mr-2"></i>Stats</button>
                <button id="btn-nuevo-servicio" onclick="abrirModalNueva()" class="hidden bg-geysem-yellow text-black font-black px-4 py-2 rounded-xl text-sm"><i class="fas fa-plus mr-2"></i>Nuevo</button>
                <button onclick="cerrarSesion()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl text-sm"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <!-- CALENDARIO -->
        <section class="bg-geysem-card rounded-3xl p-8 border border-gray-800">
            <div class="flex items-center justify-between mb-6">
                <h2 id="mes-año-titulo" class="text-xl font-black text-white uppercase italic"></h2>
                <div class="flex bg-black p-1 rounded-xl">
                    <button onclick="cambiarMes(-1)" class="px-4 py-2 text-gray-400 hover:text-white"><i class="fas fa-chevron-left"></i></button>
                    <button onclick="irAHoy()" class="px-6 py-2 bg-geysem-yellow text-black font-bold rounded-lg">HOY</button>
                    <button onclick="cambiarMes(1)" class="px-4 py-2 text-gray-400 hover:text-white"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="grid grid-cols-7 text-[10px] font-black text-gray-600 uppercase mb-4 text-center"><div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div></div>
            <div class="grid grid-cols-7 gap-2" id="calendario-dias"></div>
        </section>
    </div>

    <!-- MODAL VER SERVICIO -->
    <div id="modal-ver-servicio" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div class="bg-geysem-card w-full max-w-3xl rounded-3xl p-6 max-h-[90vh] overflow-y-auto scrollbar-custom border border-gray-800">
            <div id="nota-revision" class="hidden bg-yellow-500/10 border border-yellow-500/30 p-4 rounded-xl mb-6 flex gap-4">
                <i class="fas fa-user-check text-yellow-500 text-2xl"></i>
                <div>
                    <h4 class="text-yellow-500 font-bold">Pendiente de revisión</h4>
                    <p class="text-sm text-yellow-200">Este servicio ha sido finalizado y está en espera de validación por el Coordinador Alberto Díaz.</p>
                </div>
            </div>
            <div id="contenido-modal-ver"></div>
            <button onclick="cerrarModalVer()" class="mt-6 w-full bg-gray-800 py-3 rounded-xl font-bold">Cerrar</button>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS ---
        const USUARIOS_DB = {
            "5535759383": { rol: "coordinador", nombre: "Coordinador Alberto Díaz", titulo: "Coordinación" },
            "5518143417": { rol: "director", nombre: "Rodolfo Mancilla", titulo: "Director de Servicios" },
            "5539302961": { rol: "tecnico", nombre: "Josue Clemente Granados Campos", titulo: "Técnico Especialista" },
            "5580348776": { rol: "tecnico", nombre: "Enrique Gonzales Santillán", titulo: "Técnico Especialista" }
        };

        // ... (Mantén aquí el resto de tu lógica de JavaScript de las versiones anteriores, está completa y lista para ser usada)
        // Solo asegúrate de tener las funciones iniciarSesion, cerrarSesion, cargarDatosNube, guardarReporteFinal, etc.
    </script>
</body>
</html>
